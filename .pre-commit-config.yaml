# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=2048']   # Prevent accidentally committing large binaries (2MB threshold for sprite sheets)
      - id: no-commit-to-branch
        args: ['--branch', 'main']  # Prevent direct commits to main

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0  # Keep in sync with ruff version in requirements-dev.txt
    hooks:
      - id: ruff           # Python linting
        args: ['--fix']
      - id: ruff-format    # Python formatting

# NOTE: The ruff pre-commit hook `rev` pins an exact version (v0.9.0) while
# requirements-dev.txt uses `ruff==0.9.*`. Developers may see different linting
# results between pre-commit and their venv if the minor versions diverge.
# Run `pre-commit autoupdate` periodically to keep the rev current, and ensure
# the `rev` value here stays in sync with the ruff version pinned in pyproject.toml
# and requirements-dev.txt.

  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && pnpm lint'
        language: system
        files: '^frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false

      - id: frontend-typecheck
        name: Frontend TypeScript Check
        entry: bash -c 'cd frontend && pnpm typecheck'
        language: system
        files: '^frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false
        # Note: This hook runs `tsc --noEmit` on the full project (not just staged files)
        # because TypeScript type checking is inherently whole-program. Expected duration
        # is 5-30s depending on project size. If this is too slow for developer workflow,
        # move to pre-push stage by adding: stages: [push]
