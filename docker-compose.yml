services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MISTRAL_ENDPOINT=http://host.docker.internal:11434
      - WHISPER_BASE_URL=http://host.docker.internal:8787
      - PYTHONHASHSEED=0    # Deterministic hash() for reproducible dungeon seeds
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    # When using containerized ollama (Option A), uncomment depends_on:
    # depends_on:
    #   ollama:
    #     condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # Option A (containerized): Start with `docker compose --profile ai up`
  #   Set backend env: MISTRAL_ENDPOINT=http://ollama:11434
  # Option B (host-based): Start with `docker compose up`
  #   Set backend env: MISTRAL_ENDPOINT=http://host.docker.internal:11434
  ollama:
    image: ollama/ollama:0.5.4
    profiles: [ai]    # Only starts when explicitly requested: docker compose --profile ai up
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    environment:
      - OLLAMA_LOG_LEVEL=warn    # Prevents player creature descriptions from appearing in logs
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'mistral:7b-instruct-v0.3-q4_K_M'"]
      interval: 30s
      timeout: 10s
      start_period: 120s    # Model pull may take minutes on first start
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
    restart: unless-stopped
    networks:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  ollama_data:
